name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck-and-build:
    name: Typecheck + build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          cache: "npm"

      # setuptools needed for node-gyp on Python 3.12+ (distutils removed)
      - run: pip3 install setuptools --break-system-packages || true

      # npm install (not ci) — npm ci is strict about optional platform deps
      # (electron-builder-squirrel-windows on macOS) that resolve differently
      # on different npm versions. install auto-heals and still honors the
      # lockfile's resolved versions. We verify npm version for reproducibility.
      - run: npm -v && node -v
      - run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint
        continue-on-error: true  # lint is informational for now, not blocking

      - name: Build (main + preload + renderer)
        run: npm run build

      - name: Unit tests
        run: npm test
        continue-on-error: true  # tests scaffolded, some suites pending
