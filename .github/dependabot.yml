version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      # Batch non-major npm updates into one PR — low-risk, easier to review
      minor-and-patch:
        update-types: [minor, patch]
    # Security updates run ad-hoc regardless of schedule — Dependabot fires them
    # as soon as a new advisory lands matching our deps.
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
      include: scope
    labels: [dependencies, automated]

  - package-ecosystem: npm
    directory: "/website"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 3
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: "deps(website)"
      include: scope
    labels: [dependencies, automated]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
      include: scope
    labels: [ci, automated]
