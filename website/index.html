    <div style="max-width:720px;margin:48px auto;padding:32px;font-family:system-ui,-apple-system,sans-serif;line-height:1.6;color:#0A0A0A;">
      <h1 style="font-size:2rem;margin-bottom:16px;">Voxlit · Free Offline Voice Dictation for Mac</h1>
      <p>Voxlit is an open-source, privacy-first voice dictation app for macOS. Press a global hotkey, speak naturally, and your words are transcribed locally on your Mac and typed into whatever app is focused: Slack, Notion, Cursor, Terminal, Gmail, VS Code, iMessage, Discord, and every other app that accepts keyboard input.</p>
      <h2>Why Voxlit</h2>
      <ul>
        <li><strong>100% offline:</strong> Powered by whisper.cpp. No internet required. No audio ever leaves your Mac.</li>
        <li><strong>Free forever:</strong> MIT licensed open source. No account, no subscription, no freemium gate.</li>
        <li><strong>Apple Silicon optimized:</strong> Metal GPU acceleration for fast, low-latency transcription.</li>
        <li><strong>Universal text injection:</strong> Works in any macOS app via the Accessibility API.</li>
        <li><strong>Optional cloud mode:</strong> Bring your own OpenAI API key if you want cloud transcription.</li>
      </ul>
      <h2>Install</h2>
      <p>Run <code>curl -fsSL https://voxlit.co/install.sh | bash</code> in Terminal, or use Homebrew: <code>brew install --cask voxlit</code> after <code>brew tap rajdeepchaudhari-work/voxlit</code>. You can also download the latest DMG from <a href="https://github.com/rajdeepchaudhari-work/voxlit/releases">GitHub Releases</a>.</p>
      <p>Voxlit requires JavaScript for the interactive homepage. Source code is available on <a href="https://github.com/rajdeepchaudhari-work/voxlit">GitHub</a>.</p>
    </div>
